name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build
      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
        if: runner.os == 'Linux'
        with:
          platforms: arm64

      - uses: pypa/cibuildwheel@v2
        env:
          # Pass CIBUILDWHEEL into Linux Docker containers so setup.py can detect it
          CIBW_ENVIRONMENT_PASS_LINUX: CIBUILDWHEEL

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-pyinstaller:
    name: Build CLI binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: pyxtrackers-linux-x86_64
          - os: macos-latest
            artifact-name: pyxtrackers-macos-arm64
          - os: windows-latest
            artifact-name: pyxtrackers-windows-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller

      - name: Build standalone binary
        run: pyinstaller pyxtrackers.spec

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/pyxtrackers dist/${{ matrix.artifact-name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/pyxtrackers.exe dist/${{ matrix.artifact-name }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}*

  publish-pypi:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyxtrackers
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-github:
    name: Create GitHub Release
    needs: [build-sdist, build-wheels, build-pyinstaller]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
