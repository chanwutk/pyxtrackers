name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: pip install build && python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # Linux x86_64
          - ubuntu-24.04-arm    # Linux aarch64 (native ARM runner)
          - macos-14            # macOS arm64 (Apple Silicon / M-series)
          - macos-15-intel      # macOS x86_64 (Intel)
          - windows-latest      # Windows AMD64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pypa/cibuildwheel@v2
        env:
          # Each runner builds only its native architecture
          CIBW_ARCHS: auto
          # Pass CIBUILDWHEEL into Linux Docker containers so setup.py can detect it
          CIBW_ENVIRONMENT_PASS_LINUX: CIBUILDWHEEL

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-pyinstaller:
    name: Build CLI binary (${{ matrix.artifact-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: pyxtrackers-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact-name: pyxtrackers-linux-aarch64
          - os: macos-14
            artifact-name: pyxtrackers-macos-arm64
          - os: macos-15-intel
            artifact-name: pyxtrackers-macos-x86_64
          - os: windows-latest
            artifact-name: pyxtrackers-windows-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and PyInstaller
        run: pip install -e . && pip install pyinstaller

      - name: Build Cython extensions
        run: python setup.py build_ext --inplace

      - name: Build standalone binary
        run: pyinstaller pyxtrackers.spec

      - name: Smoke-test binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            BINARY="dist/pyxtrackers.exe"
          else
            BINARY="dist/pyxtrackers"
          fi
          echo "100,200,300,400,0.9" | "$BINARY" sort --min-hits 1
          echo "100,200,300,400,0.9" | "$BINARY" bytetrack
          echo "100,200,300,400,0.9" | "$BINARY" ocsort --min-hits 1

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/pyxtrackers dist/${{ matrix.artifact-name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/pyxtrackers.exe dist/${{ matrix.artifact-name }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}*

  publish-pypi:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyxtrackers
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-github:
    name: Create GitHub Release
    needs: [build-sdist, build-wheels, build-pyinstaller]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
