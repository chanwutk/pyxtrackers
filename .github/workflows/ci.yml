name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # Linux x86_64
          - ubuntu-24.04-arm    # Linux aarch64
          - macos-14            # macOS arm64 (Apple Silicon)
          - macos-15            # macOS arm64 (Apple Silicon)
          - macos-26            # macOS arm64 (Apple Silicon)
          - macos-14-large      # macOS x86_64 (Intel)
          - macos-15-intel      # macOS x86_64 (Intel)
          - macos-26-intel      # macOS x86_64 (Intel)
          - windows-latest      # Windows AMD64
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build standalone binary
        run: pyinstaller pyxtrackers.spec

      - name: Run tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            BINARY="dist/pyxtrackers.exe"
          else
            BINARY="dist/pyxtrackers"
          fi
          pytest tests/ -v --cli-binary "$BINARY"
